<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Arenas of The Scarlett Isles</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand__title">Arenas of The Scarlett Isles</div>
      <div class="brand__subtitle">POV arena mini-games (skill + attack + cinematic overlays)</div>
    </div>

    <div class="controls">
      <label class="field">
        <span>Arena</span>
        <select id="arenaSelect"></select>
      </label>

      <label class="field">
        <span>Round</span>
        <select id="roundSelect"></select>
      </label>

      <button id="enterArenaBtn" class="btn btn--primary">Enter The Arena</button>
      <button id="addPlayerBtn" class="btn btn--primary">Add Player</button>

      <div class="divider"></div>

      <button id="backToStartBtn" class="btn btn--ghost">Back to Start</button>
      <button id="resetRunBtn" class="btn btn--ghost">Reset Run</button>
    </div>
  </header>

  <main class="layout">
    <section class="mapPanel">
      <div id="sceneViewport" class="sceneViewport">
  <img id="sceneBase" class="sceneBase" alt="Arena scene" />

  <!-- Secondary overlay (behind primary). Used for Lion Totems layer -->
  <img id="sceneBoss2" class="sceneBoss sceneBoss2 hidden" alt="Secondary overlay" />

  <!-- Primary overlay (in front of secondary). Used for Swordsmen layer -->
  <img id="sceneBoss" class="sceneBoss hidden" alt="Boss overlay" />

  <img id="sceneOverlay" class="sceneOverlay hidden" alt="Cinematic overlay" />
</div>

<!-- Dock lane BELOW the image (your red rectangle area) -->
<div id="dockLane" class="dockLane" aria-label="Turn Dock Lane">
  <div id="turnDock" class="turnDock hidden" aria-label="Turn panel">
    <div class="dockHeader">
      <div>
        <div id="dockTitle" class="dockTitle">Turn</div>
        <div id="dockSub" class="dockSub"></div>
      </div>
      <button id="dockClose" class="iconBtn" aria-label="Close">✕</button>
    </div>
    <div id="dockBody" class="dockBody"></div>
    <div id="dockActions" class="dockActions"></div>
  </div>
</div>

<div class="mapFooter">
        <div class="pill" id="statusPill">Add players, then Enter The Arena.</div>
        <div class="pill pill--right">
          <span class="muted">Gold:</span> <strong id="goldTotal">0</strong>
          <span class="muted">|</span>
          <span class="muted">Success:</span> <strong id="succCount">0</strong>/<span id="succTarget">0</span>
          <span class="muted">Fail:</span> <strong id="failCount">0</strong>/<span id="failMax">0</span>
          <span class="muted">|</span>
          <span class="muted">Turn:</span> <strong id="turnCount">0</strong>
        </div>
      </div>
    </section>

    <aside class="sidePanel">
      <div class="panelBlock">
        <div class="panelTitle">Party</div>
        <div id="partyList" class="list"></div>
      </div>

      <div class="panelBlock">
        <div class="panelTitle">Opponents</div>
        <div id="enemyList" class="list"></div>
      </div>

      <div class="panelBlock">
        <div class="panelTitle">Round Console</div>
        <div class="console" id="console"></div>
        <div class="consoleActions">
          <button id="viewRulesBtn" class="btn btn--ghost">View Rules</button>
          <button id="playTurnBtn" class="btn btn--primary">Play Turn</button>
          <button id="endRoundBtn" class="btn btn--ghost">End Round</button>
          <button id="forfeitBtn" class="btn btn--danger">Forfeit</button>
        </div>
      </div>
    </aside>
  </main>

  <template id="tplAddPlayer">
    <form class="form" id="addPlayerForm">
      <div class="grid2">
        <label class="field">
          <span>Name</span>
          <input name="name" required placeholder="e.g. Runa" />
        </label>
        <label class="field">
          <span>Max HP</span>
          <input name="maxHp" type="number" required min="1" value="60" />
        </label>
      </div>

      <label class="field">
        <span>Portrait (small thumbnail)</span>
        <input name="image" type="file" accept="image/*" />
        <small class="hint">This is stored compressed to avoid iOS storage limits.</small>
      </label>

      <label class="field">
        <span>Tag (optional)</span>
        <input name="tag" placeholder="e.g. Blue Team" />
      </label>

      <div class="row">
        <button class="btn btn--primary" type="submit">Add</button>
        <button class="btn btn--ghost" type="button" data-cancel>Cancel</button>
      </div>
    </form>
  </template>

  <script src="app.js"></script>
</body>
</html>
